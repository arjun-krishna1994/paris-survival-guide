site_name: Paris Survival Guide
site_url: https://YOUR-SITE-URL.com/
site_description: The essential 1% of French you need for 99% of daily interactions in Paris.
site_author: Arjun Krishna
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  logo: assets/img/favicon.png
  favicon: assets/img/favicon.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
  palette:
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: Roboto Mono

plugins:
  - search:
      lang: en
  - social:
      cards: true
      cards_layout_options:
        background_color: "#1D3557"
        color: "#F8FAFC"
        font_family: "Outfit"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ["docs"]

extra:
  generator: false

extra_css:
  - assets/css/custom.css?v=1.0.1

extra_javascript: []

nav:
  - Home: index.md
  - Lessons:
      - 1. Accents & Politeness: 01_history_and_nuances.md
      - 2. Cafe & Food: 02_cafe_and_food.md
      - 3. Transport & Numbers: 03_navigation_and_transport.md
      - 4. Shopping & Logistics: 04_shopping_and_logistics.md
      - 5. Social & Slang: 05_social_and_slang.md
      - 6. Health & Emergencies: 06_health_and_emergencies.md
      - 7. Opinions & Smalltalk: 07_opinions_and_smalltalk.md
      - 8. Grammar Hacks: 08_grammar_hacks.md
      - 9. Vocabulary Multipliers: 09_vocabulary_multipliers.md
      - 10. Renting & Household: 10_household_and_logistics.md
  - Supplementary:
      - Flashcards: flashcards/index.md
      - Flashcards (En -> Fr): flashcards_source_target.md
      - Flashcards (Fr -> En): flashcards_target_source.md
  - Interactive Games:
      - Overview: games/index.md
      - Paris Cafe Simulator: games/cafe_negotiation.md
      - Suffix Station Quiz: games/suffix_station.md
  - Profile: nanna_profile.md

extra_javascript:
  - assets/js/badges.js
  - assets/js/header.js
  - assets/js/wotd.js?v=1.0.0
  - assets/js/share.js?v=1.0.0
